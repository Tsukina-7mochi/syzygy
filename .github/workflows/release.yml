on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple


  upload-artifact:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}

    steps:
      - uses: actions/checkout@v5

      - uses: leafo/gh-actions-lua@v12
        with:
          lua-version: "5.4"

      - name: Build
        run: make build

      - name: Upload Artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} ./dist/syzygy.lua

  upload-luarocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: leafo/gh-actions-lua@v12
        with:
          lua-version: "5.4"

      - uses: leafo/gh-actions-luarocks@v6

      - name: Pack
        run: luarocks pack *.rockspec

      - name: Upload
        run: luarocks upload *.rockspec --api-key=${{ secrets.LUAROCKS_API_KEY }}
