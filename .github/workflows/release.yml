name: release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  LUA_BUILD_VERSION: "5.4"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple

  upload-artifact:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-and-build
        with:
          luaVersion: ${{ env.LUA_BUILD_VERSION }}

      - name: Upload Artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} ./dist/syzygy.lua

  upload-luarocks:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-and-build
        with:
          luaVersion: ${{ env.LUA_BUILD_VERSION }}

      - uses: leafo/gh-actions-luarocks@v6

      - name: Pack
        run: luarocks pack *.rockspec

      - name: Upload
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: luarocks upload *.rockspec --api-key="$LUAROCKS_API_KEY"
